<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Focus AI — diqqatni nurga aylantiruvchi odat kuzatuvchi.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Focus AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Focus AI</title>
  <link rel="manifest" href="manifest.json">

  <!-- Brendlangan yuklanish ekrani: qora fon + amber aylanma yoy.
       Flutter birinchi kadrni chizgach (flutter-first-frame) silliq yo'qoladi.
       Shu tufayli zaif mashinada ham hech qachon "oq ekran" ko'rinmaydi. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0B0B0E;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 42%, rgba(255, 216, 110, 0.12), #0B0B0E 60%);
      transition: opacity 0.45s ease;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #loading .arc {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.07);
      border-top-color: #FFD86E;
      border-right-color: #FFD86E;
      box-shadow: 0 0 26px rgba(255, 216, 110, 0.28);
      animation: spin 1s linear infinite;
    }
    #loading .brand {
      margin-top: 26px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    #loading .brand b { color: #FFD86E; }
    #loading .tag {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      letter-spacing: 0.3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="arc"></div>
    <div class="brand">Focus <b>AI</b></div>
    <div class="tag">Diqqatni nurga aylantir</div>
  </div>

  <script>
    // Flutter birinchi kadrni chizganda yuklanish ekranini silliq olib tashlaymiz.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(function () { el.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
