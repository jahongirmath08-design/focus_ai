# 3 GB RAM li kompyuter uchun moslangan: oldin -Xmx8G edi -> JVM qulagan (Out of Memory).
# Endi Gradle kam xotira ishlatadi.
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Kam xotirali mashina uchun qo'shimcha barqarorlik sozlamalari:
org.gradle.daemon=false
org.gradle.workers.max=1
org.gradle.parallel=false
org.gradle.configureondemand=true
